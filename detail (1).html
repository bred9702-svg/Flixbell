<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flixbelle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0E0B0A;--gold:#E8B04B;--ember:#E3502B;--cream:#F6EFE3;--line:rgba(246,239,227,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--cream);font-family:'Inter',sans-serif;min-height:100vh}
.nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:18px 28px;background:var(--ink);border-bottom:1px solid var(--line)}
.back{display:flex;align-items:center;gap:8px;color:var(--cream);text-decoration:none;font-weight:600;font-size:15px}
.back svg{flex:none}
.brand{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:22px;color:var(--gold);display:flex;align-items:center;gap:8px}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--ember)}

.hero{position:relative;min-height:62vh;display:flex;align-items:flex-end;padding:110px 28px 40px;background-size:cover;background-position:center}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg, var(--ink) 4%, rgba(14,11,10,.55) 45%, rgba(14,11,10,.25));}
.hero-inner{position:relative;z-index:1;max-width:760px}
.badges{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.badge{background:var(--ember);color:var(--cream);font-weight:700;font-size:12px;letter-spacing:.06em;padding:6px 12px;border-radius:6px}
.badge.ghost{background:transparent;border:1px solid var(--line);color:var(--gold);letter-spacing:.12em;text-transform:uppercase;font-size:11px}
h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(34px,6vw,58px);line-height:1.05;margin-bottom:16px}
.meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;color:var(--cream);opacity:.85;font-size:15px;margin-bottom:18px}
.meta span:not(:last-child)::after{content:"·";margin-left:10px;opacity:.5}
.syn{font-size:16px;line-height:1.6;color:var(--cream);opacity:.9;max-width:620px;margin-bottom:26px}
.actions{display:flex;gap:12px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:10px;padding:14px 26px;border-radius:8px;font-weight:700;font-size:15px;border:none;cursor:pointer;text-decoration:none;font-family:inherit}
.btn-play{background:var(--ember);color:var(--cream)}
.btn-play:hover{background:#f06038}
.btn-ghost{background:rgba(246,239,227,.08);color:var(--cream);border:1px solid var(--line)}
.btn-ghost:hover{background:rgba(246,239,227,.14)}

.wax{height:10px;background-image:repeating-linear-gradient(45deg,var(--ember) 0 12px,var(--gold) 12px 24px,var(--ink) 24px 36px)}

.section{max-width:900px;margin:0 auto;padding:48px 28px}
.section h2{font-family:'Bricolage Grotesque',sans-serif;font-size:22px;margin-bottom:14px}
.section p{font-size:15px;line-height:1.7;opacity:.85}
footer{text-align:center;padding:30px;font-size:13px;opacity:.6}
</style>
</head>
<body>
<nav class="nav">
  <a class="back" href="index.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg> Retour</a>
  <div class="brand"><span class="dot"></span> Flixbelle</div>
</nav>

<section class="hero" id="hero">
  <div class="hero-inner">
    <div class="badges" id="badges"></div>
    <h1 id="titre">…</h1>
    <div class="meta" id="meta"></div>
    <p class="syn" id="syn"></p>
    <div class="actions">
      <a class="btn btn-play" id="playBtn" href="#"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Lire</a>
      <a class="btn btn-ghost" href="index.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg> Retour au catalogue</a>
    </div>
  </div>
</section>
<div class="wax"></div>
<section class="section">
  <h2>À propos</h2>
  <p id="about"></p>
</section>
<footer>Fait à Kinshasa 🇨🇩 — Flixbelle, démo de présentation</footer>

<script src="films-data.js"></script>
<script>
const params=new URLSearchParams(location.search);
const id=params.get('id');
const f=findFilm(id);

if(!f){
  document.getElementById('titre').textContent="Titre introuvable";
  document.getElementById('syn').textContent="Retourne à l'accueil et choisis un titre dans le catalogue.";
  document.getElementById('playBtn').style.display='none';
  document.getElementById('about').textContent="";
}else{
  document.title="Flixbelle — "+f.t;
  document.getElementById('titre').textContent=f.t;

  const grad=PALETTES[f.g||0];
  const hero=document.getElementById('hero');
  const img=f.yt?`url('https://i.ytimg.com/vi/${f.yt}/maxresdefault.jpg') center/cover, `:'';
  hero.style.backgroundImage=img+grad;

  const badges=[];
  badges.push(`<span class="badge ghost">${f.d||'Série'}</span>`);
  if(f.genre) badges.push(`<span class="badge ghost">${f.genre}</span>`);
  if(f.neuf) badges.push(`<span class="badge">NOUVEAU</span>`);
  document.getElementById('badges').innerHTML=badges.join('');

  const meta=[];
  if(f.an) meta.push(`<span>${f.an}</span>`);
  if(f.genre) meta.push(`<span>${f.genre}</span>`);
  meta.push(`<span>Bellevue Kandy</span>`);
  document.getElementById('meta').innerHTML=meta.join('');

  document.getElementById('syn').textContent=f.syn || `${f.t} — une production Bellevue Kandy / Bel-Art Prod, disponible sur Flixbelle.`;
  document.getElementById('about').textContent=`${f.t} fait partie du catalogue Flixbelle, la plateforme de streaming dédiée aux productions congolaises de Bellevue Kandy. Genre : ${f.genre||'—'}${f.an?(' · '+f.an):''}.`;

  document.getElementById('playBtn').href='watch.html?id='+encodeURIComponent(f.id);
}
</script>
</body>
</html>
