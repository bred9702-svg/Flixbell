<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flixbelle — Le théâtre et le cinéma congolais, en grand</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --ink:#0E0B0A; --ink-2:#15100E; --ink-3:#211A15;
  --gold:#E8B04B; --gold-soft:#F2CB80; --ember:#E3502B;
  --cream:#F6EFE3; --sand:#B7A78F; --muted:#877766;
  --line:rgba(232,176,75,.16);
  --font-display:'Bricolage Grotesque', system-ui, sans-serif;
  --font-ui:'Inter', system-ui, sans-serif;
  --maxw:1320px; --pad:clamp(16px,4vw,56px);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--cream);font-family:var(--font-ui);-webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.5}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:4px}
.wax{height:14px;background:repeating-linear-gradient(135deg,var(--gold) 0 8px,transparent 8px 16px),repeating-linear-gradient(45deg,var(--ember) 0 8px,transparent 8px 16px),var(--ink-2);background-blend-mode:screen;opacity:.5;mask:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent)}

.nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;gap:28px;padding:18px var(--pad);background:var(--ink);border-bottom:1px solid var(--line);transition:box-shadow .3s ease}
.nav.scrolled{box-shadow:0 6px 22px rgba(0,0,0,.55)}
.brand{font-family:var(--font-display);font-weight:800;font-size:26px;letter-spacing:.02em;color:var(--gold);display:flex;align-items:center;gap:9px}
.brand .dot{width:9px;height:9px;border-radius:50%;background:var(--ember);box-shadow:0 0 14px var(--ember)}
.brand-logo{height:40px;width:auto;display:block}
.foot-brand .brand-logo{height:52px}
