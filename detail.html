<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flixbelle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0E0B0A;--gold:#E8B04B;--ember:#E3502B;--cream:#F6EFE3;--line:rgba(246,239,227,.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--cream);font-family:'Inter',sans-serif;min-height:100vh}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:18px 28px;background:var(--ink);border-bottom:1px solid var(--line)}
.back{display:flex;align-items:center;gap:8px;color:var(--cream);text-decoration:none;font-weight:600;font-size:15px}
.brand{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:22px;color:var(--gold);display:flex;align-items:center;gap:8px}
.brand .dot{width:10px;height:10px;border-radius:50%;background:var(--ember)}

/* HERO avec pochette en fond */
.hero{position:relative;min-height:70vh;display:flex;align-items:flex-end;padding:110px 28px 48px;background-size:cover;background-position:center top}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,var(--ink) 0%,rgba(14,11,10,.75) 40%,rgba(14,11,10,.3) 75%,rgba(14,11,10,.15))}
.hero-inner{position:relative;z-index:1;max-width:760px;width:100%}
.badges{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.badge{background:var(--ember);color:var(--cream);font-weight:700;font-size:12px;letter-spacing:.06em;padding:6px 12px;border-radius:6px}
.badge.ghost{background:transparent;border:1px solid rgba(246,239,227,.4);color:var(--gold);letter-spacing:.12em;text-transform:uppercase;font-size:11px}
h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(32px,5vw,56px);line-height:1.05;margin-bottom:14px}
.meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;color:var(--cream);opacity:.8;font-size:14px;margin-bottom:16px}
.meta span:not(:last-child)::after{content:"·";margin-left:8px;opacity:.5}
.syn{font-size:15px;line-height:1.65;color:var(--cream);opacity:.88;max-width:600px;margin-bottom:28px}
.actions{display:flex;gap:12px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:10px;padding:13px 24px;border-radius:8px;font-weight:700;font-size:15px;border:none;cursor:pointer;text-decoration:none;font-family:inherit;transition:background .2s}
.btn-play{background:var(--ember);color:var(--cream)}
.btn-play:hover{background:#f06038}
.btn-ghost{background:rgba(246,239,227,.08);color:var(--cream);border:1px solid var(--line)}
.btn-ghost:hover{background:rgba(246,239,227,.14)}

/* SEPARATEUR */
.wax{height:10px;background-image:repeating-linear-gradient(45deg,var(--ember) 0 12px,var(--gold) 12px 24px,var(--ink) 24px 36px)}

/* EPISODES */
.episodes{max-width:900px;margin:0 auto;padding:48px 28px 16px}
.episodes h2{font-family:'Bricolage Grotesque',sans-serif;font-size:22px;margin-bottom:24px;color:var(--cream)}
.ep-list{display:flex;flex-direction:column;gap:12px}
.ep{display:flex;align-items:center;gap:16px;background:rgba(246,239,227,.04);border:1px solid var(--line);border-radius:10px;padding:16px 20px;transition:background .2s}
.ep:hover{background:rgba(246,239,227,.08)}
.ep-num{font-family:'Bricolage Grotesque',sans-serif;font-size:28px;font-weight:800;color:var(--gold);opacity:.6;min-width:42px;text-align:center}
.ep-info{flex:1}
.ep-title{font-weight:600;font-size:15px;margin-bottom:3px}
.ep-sub{font-size:13px;opacity:.55}
.ep-btn{display:inline-flex;align-items:center;gap:8px;background:var(--ember);color:var(--cream);border:none;border-radius:6px;padding:9px 18px;font-weight:700;font-size:13px;cursor:pointer;text-decoration:none;font-family:inherit;flex:none;transition:background .2s}
.ep-btn:hover{background:#f06038}

/* A PROPOS */
.section{max-width:900px;margin:0 auto;padding:32px 28px 48px}
.section h2{font-family:'Bricolage Grotesque',sans-serif;font-size:20px;margin-bottom:12px}
.section p{font-size:14px;line-height:1.7;opacity:.7}

footer{text-align:center;padding:28px;font-size:13px;opacity:.5}
</style>
</head>
<body>
<nav class="nav">
  <a class="back" id="backLink" href="index.html">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg> Retour
  </a>
  <div class="brand"><span class="dot"></span> Flixbelle</div>
</nav>

<section class="hero" id="hero">
  <div class="hero-inner">
    <div class="badges" id="badges"></div>
    <h1 id="titre">…</h1>
    <div class="meta" id="meta"></div>
    <p class="syn" id="syn"></p>
    <div class="actions">
      <a class="btn btn-play" id="playBtn" href="#">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Lire l'épisode 1
      </a>
      <a class="btn btn-ghost" href="index.html">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg> Catalogue
      </a>
    </div>
  </div>
</section>

<div class="wax"></div>

<div class="episodes">
  <h2 id="ep-titre">Épisodes — Saison 1</h2>
  <div class="ep-list" id="epList"></div>
</div>

<div class="section">
  <h2>À propos</h2>
  <p id="about"></p>
</div>

<footer>Fait à Kinshasa 🇨🇩 — Flixbelle, démo de présentation</footer>

<script src="films-data.js"></script>
<script>
const params=new URLSearchParams(location.search);
const id=params.get('id');
const f=findFilm(id);
const NB_EP=10;

if(!f){
  document.getElementById('titre').textContent="Titre introuvable";
  document.getElementById('syn').textContent="Retourne à l'accueil et choisis un titre dans le catalogue.";
  document.getElementById('playBtn').style.display='none';
  document.getElementById('epList').innerHTML='';
  document.getElementById('about').textContent='';
}else{
  document.title="Flixbelle — "+f.t;
  document.getElementById('titre').textContent=f.t;

  // Pochette en fond du hero
  const hero=document.getElementById('hero');
  const grad=PALETTES[f.g||0];
  if(f.yt){
    const hi=new Image();
    hi.onload=()=>{ if(hi.naturalWidth>120) hero.style.backgroundImage=`url('${hi.src}'),${grad}`; };
    hi.onerror=()=>{ hero.style.backgroundImage=`url('https://i.ytimg.com/vi/${f.yt}/mqdefault.jpg'),${grad}`; };
    hi.src=`https://i.ytimg.com/vi/${f.yt}/maxresdefault.jpg`;
    hero.style.backgroundImage=`url('https://i.ytimg.com/vi/${f.yt}/mqdefault.jpg'),${grad}`;
  } else {
    hero.style.backgroundImage=grad;
  }
  hero.style.backgroundSize='cover';
  hero.style.backgroundPosition='center top';

  // Badges
  const badges=[];
  if(f.neuf) badges.push(`<span class="badge">NOUVEAU</span>`);
  badges.push(`<span class="badge ghost">${f.d||'Série'}</span>`);
  if(f.genre) badges.push(`<span class="badge ghost">${f.genre}</span>`);
  document.getElementById('badges').innerHTML=badges.join('');

  // Meta
  const meta=[];
  if(f.an) meta.push(`<span>${f.an}</span>`);
  if(f.genre) meta.push(`<span>${f.genre}</span>`);
  meta.push(`<span>${NB_EP} épisodes</span>`);
  meta.push(`<span>Bellevue Kandy</span>`);
  document.getElementById('meta').innerHTML=meta.join('');

  // Synopsis
  document.getElementById('syn').textContent=f.syn||`${f.t} — une production Bellevue Kandy / Bel-Art Prod, disponible sur Flixbelle.`;

  // Bouton Lire ep1
  document.getElementById('playBtn').href='watch.html?id='+encodeURIComponent(f.id)+'&ep=1';

  // À propos
  document.getElementById('about').textContent=`${f.t} est une production Bellevue Kandy / Bel-Art Prod. Genre : ${f.genre||'Drame'}${f.an?' · '+f.an:''} · ${NB_EP} épisodes.`;

  // Liste épisodes
  document.getElementById('ep-titre').textContent=`Épisodes — ${f.t}`;
  const list=document.getElementById('epList');
  for(let i=1;i<=NB_EP;i++){
    const ep=document.createElement('div');
    ep.className='ep';
    ep.innerHTML=`
      <div class="ep-num">${i}</div>
      <div class="ep-info">
        <div class="ep-title">Épisode ${i}</div>
        <div class="ep-sub">Saison 1 · ${f.genre||'Drame'} · Bellevue Kandy</div>
      </div>
      <a class="ep-btn" href="watch.html?id=${encodeURIComponent(f.id)}&ep=${i}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Lire
      </a>`;
    list.appendChild(ep);
  }
}
</script>
</body>
</html>
